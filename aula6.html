        let cotacaoDolar = 5.19

        function converterRealParaDolar(valor,dolar){
         return  'U$$' + ' ' +(valor / dolar).toFixed(2).replace('.',',') +'<br>'
        }

        function converterRealDolar(valor,dolar){
            document.write('U$$'+ ' '+(valor / dolar).toFixed(2).replace('.',',') +'<br>')

        }
        document.write(converterRealParaDolar(10000, cotacaoDolar))
        document.write(converterRealParaDolar(12000, cotacaoDolar))
        document.write(converterRealParaDolar(15000, cotacaoDolar))

        converterRealDolar(10,cotacaoDolar)
        converterRealDolar(50,cotacaoDolar)
        
    </script>
